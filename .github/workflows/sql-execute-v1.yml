# ============================================================================
# Shared Workflow: SQL Script Executor with Backup
# Repository: AdaSoftDevSecOps/shared-workflows
# Path: .github/workflows/sql-execute.yml
#
# ลำดับรัน (ตายตัว — ห้ามรันแทรก):
#   1. Script-StoreBack-Structure.sql
#   2. Script-StoreBack-Stored.sql
#   3. Script-StoreBack-Data.sql
#
# Compatible: Windows PowerShell 5.1 (shell: powershell)
# ============================================================================
name: SQL Script Executor

on:
  workflow_call:
    inputs:
      db_name:
        description: 'Target database name'
        required: true
        type: string
      project_name:
        description: 'Project name for backup folder'
        required: true
        type: string
      backup_enabled:
        description: 'Backup database before execution'
        required: false
        type: boolean
        default: true
      script_path:
        description: 'Directory containing SQL scripts (relative to repo root)'
        required: false
        type: string
        default: '.'
      stop_on_error:
        description: 'Stop remaining scripts if any step fails'
        required: false
        type: boolean
        default: true
      runner_label:
        description: 'Self-hosted runner label (e.g. env-dev, env-prod)'
        required: true
        type: string

    secrets:
      SQL_HOST:
        required: true
      SQL_PORT:
        required: true
      SQL_USER:
        required: true
      SQL_PASSWORD:
        required: true
      SQL_BACKUP_PATH:
        required: true

jobs:
  execute-sql:
    name: "${{ inputs.project_name }} → ${{ inputs.db_name }}"
    runs-on: [self-hosted, windows, "${{ inputs.runner_label }}"]

    concurrency:
      group: sql-deploy-${{ inputs.runner_label }}-${{ inputs.db_name }}
      cancel-in-progress: false

    steps:
      # =====================================================
      # 1. Checkout caller repository
      # =====================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # =====================================================
      # 2. Validate script files
      # =====================================================
      - name: Validate script files
        id: validate
        shell: powershell
        run: |
          $scriptDir = "${{ inputs.script_path }}"
          $scripts = @("Script-StoreBack-Structure.sql", "Script-StoreBack-Stored.sql", "Script-StoreBack-Data.sql")

          Write-Host "::group::Validating scripts in '$scriptDir'"

          $foundList = @()

          foreach ($script in $scripts) {
            $fullPath = Join-Path $scriptDir $script
            if (Test-Path $fullPath) {
              $size = (Get-Item $fullPath).Length
              Write-Host "  [FOUND]   $script ($size bytes)"
              $foundList += $fullPath
            } else {
              Write-Host "  [MISSING] $script — will be skipped"
            }
          }

          if ($foundList.Count -eq 0) {
            Write-Host "::warning::No StoreBack scripts found"
            echo "has_scripts=false" >> $env:GITHUB_OUTPUT
            Write-Host "::endgroup::"
            exit 0
          }

          echo "has_scripts=true" >> $env:GITHUB_OUTPUT
          echo "script_count=$($foundList.Count)" >> $env:GITHUB_OUTPUT

          # สร้าง JSON array ด้วยมือ (compatible PS 5.1)
          $jsonItems = $foundList | ForEach-Object { '"' + ($_ -replace '\\', '\\') + '"' }
          $json = '[' + ($jsonItems -join ',') + ']'
          echo "script_list=$json" >> $env:GITHUB_OUTPUT

          Write-Host "Will execute $($foundList.Count) of $($scripts.Count) scripts"
          Write-Host "::endgroup::"

      # =====================================================
      # 3. Verify SQL Server connectivity
      # =====================================================
      - name: Verify SQL Server connection
        if: steps.validate.outputs.has_scripts == 'true'
        shell: powershell
        run: |
          $server = "${{ secrets.SQL_HOST }},${{ secrets.SQL_PORT }}"

          Write-Host "::group::Connecting to [${{ inputs.db_name }}]"

          $result = sqlcmd -S $server -U "${{ secrets.SQL_USER }}" -P "${{ secrets.SQL_PASSWORD }}" -d "${{ inputs.db_name }}" -Q "SELECT @@SERVERNAME AS [Server], DB_NAME() AS [Database]" -W -h -1 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Connection failed: $result"
            exit 1
          }

          Write-Host "Connected: $result"
          Write-Host "::endgroup::"

      # =====================================================
      # 4. Backup Database
      # =====================================================
      - name: Backup database
        if: inputs.backup_enabled && steps.validate.outputs.has_scripts == 'true'
        id: backup
        shell: powershell
        run: |
          $server      = "${{ secrets.SQL_HOST }},${{ secrets.SQL_PORT }}"
          $dbName      = "${{ inputs.db_name }}"
          $projectName = "${{ inputs.project_name }}"
          $backupBase  = "${{ secrets.SQL_BACKUP_PATH }}"
          $timestamp   = Get-Date -Format "yyyyMMdd_HHmmss"

          $backupDir  = Join-Path $backupBase $projectName
          $backupFile = $dbName + "_" + $timestamp + "_pre-deploy.bak"
          $backupPath = Join-Path $backupDir $backupFile

          Write-Host "::group::Backing up [$dbName]"

          sqlcmd -S $server -U "${{ secrets.SQL_USER }}" -P "${{ secrets.SQL_PASSWORD }}" -Q "EXEC master.dbo.xp_create_subdir N'$backupDir';" 2>&1 | Write-Host

          $backupSql = "BACKUP DATABASE [$dbName] TO DISK = N'$backupPath' WITH COMPRESSION, CHECKSUM, INIT, STATS = 10, NAME = N'$dbName - Pre-Deploy $timestamp';"

          $result = sqlcmd -S $server -U "${{ secrets.SQL_USER }}" -P "${{ secrets.SQL_PASSWORD }}" -Q $backupSql 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Backup FAILED — aborting"
            Write-Host $result
            exit 1
          }

          Write-Host $result
          Write-Host "Backup completed: $backupPath"
          echo "backup_path=$backupPath" >> $env:GITHUB_OUTPUT
          Write-Host "::endgroup::"

      # =====================================================
      # 5. Execute: Structure → Stored → Data
      # =====================================================
      - name: "Execute: Structure -> Stored -> Data"
        if: steps.validate.outputs.has_scripts == 'true'
        id: execute
        shell: powershell
        run: |
          $server      = "${{ secrets.SQL_HOST }},${{ secrets.SQL_PORT }}"
          $dbName      = "${{ inputs.db_name }}"
          $scriptList  = '${{ steps.validate.outputs.script_list }}' | ConvertFrom-Json
          $stopOnError = [System.Boolean]::Parse("${{ inputs.stop_on_error }}")
          $total       = $scriptList.Count
          $success     = 0
          $failed      = 0
          $failedFiles = @()

          $stepLabels = @{}
          $stepLabels["Script-StoreBack-Structure.sql"] = "STEP 1/3 — Structure (DDL)"
          $stepLabels["Script-StoreBack-Stored.sql"]    = "STEP 2/3 — Stored Procedures"
          $stepLabels["Script-StoreBack-Data.sql"]      = "STEP 3/3 — Data (DML)"

          Write-Host "::group::Executing $total script(s) on [$dbName]"
          Write-Host "Order: Structure -> Stored -> Data"
          Write-Host ""

          foreach ($scriptPath in $scriptList) {
            $scriptName = Split-Path $scriptPath -Leaf
            $label = $stepLabels[$scriptName]
            if (-not $label) { $label = $scriptName }

            Write-Host "============================================"
            Write-Host "$label"
            Write-Host "============================================"

            $startTime = Get-Date

            $result = sqlcmd -S $server -U "${{ secrets.SQL_USER }}" -P "${{ secrets.SQL_PASSWORD }}" -d $dbName -i "$scriptPath" -b -r1 2>&1

            $duration = [math]::Round(((Get-Date) - $startTime).TotalSeconds, 1)

            if ($LASTEXITCODE -ne 0) {
              $failed++
              $failedFiles += $scriptName
              Write-Host "::error::FAILED: $scriptName ($duration s)"
              Write-Host $result

              if ($stopOnError) {
                Write-Host "::error::HALTING — remaining scripts will not run"
                echo "status=FAILED" >> $env:GITHUB_OUTPUT
                echo "failed_at=$scriptName" >> $env:GITHUB_OUTPUT
                echo ("failed_files=" + ($failedFiles -join ',')) >> $env:GITHUB_OUTPUT
                exit 1
              }
            } else {
              $success++
              Write-Host $result
              Write-Host "SUCCESS: $scriptName ($duration s)"
            }

            Write-Host ""
          }

          Write-Host "====== COMPLETED ======"
          Write-Host "Total: $total | Success: $success | Failed: $failed"
          Write-Host "::endgroup::"

          if ($failed -gt 0) {
            echo "status=PARTIAL_FAILURE" >> $env:GITHUB_OUTPUT
            echo ("failed_files=" + ($failedFiles -join ',')) >> $env:GITHUB_OUTPUT
            exit 1
          }

          echo "status=SUCCESS" >> $env:GITHUB_OUTPUT

      # =====================================================
      # 6. Report
      # =====================================================
      - name: Generate report
        if: always() && steps.validate.outputs.has_scripts == 'true'
        shell: powershell
        run: |
          $status      = "${{ steps.execute.outputs.status }}"
          $backupPath  = "${{ steps.backup.outputs.backup_path }}"
          $failedFiles = "${{ steps.execute.outputs.failed_files }}"
          $scriptCount = "${{ steps.validate.outputs.script_count }}"
          $dbName      = "${{ inputs.db_name }}"
          $projName    = "${{ inputs.project_name }}"

          $emoji = "INFO"
          if ($status -eq "SUCCESS")         { $emoji = "SUCCESS" }
          if ($status -eq "PARTIAL_FAILURE") { $emoji = "PARTIAL_FAILURE" }
          if ($status -eq "FAILED")          { $emoji = "FAILED" }

          $lines = @()
          $lines += "## SQL Deployment Report"
          $lines += ""
          $lines += "| Item | Detail |"
          $lines += "|------|--------|"
          $lines += "| **Project** | $projName |"
          $lines += "| **Database** | ``$dbName`` |"
          $lines += "| **Runner** | ``${{ inputs.runner_label }}`` |"
          $lines += "| **Scripts** | $scriptCount |"
          $lines += "| **Status** | **$emoji** |"
          $lines += "| **Backup** | ``$backupPath`` |"
          $lines += "| **Branch** | ``${{ github.ref_name }}`` |"
          $lines += "| **By** | @${{ github.actor }} |"
          $lines += ""
          $lines += "### Execution Order"
          $lines += ""
          $lines += "| Step | Script | Status |"
          $lines += "|------|--------|--------|"

          $allNames  = @("Script-StoreBack-Structure.sql", "Script-StoreBack-Stored.sql", "Script-StoreBack-Data.sql")
          $allLabels = @("1", "2", "3")
          $failedList = @()
          if ($failedFiles) { $failedList = $failedFiles -split ',' }
          $hitFailed = $false

          for ($i = 0; $i -lt $allNames.Count; $i++) {
            $n = $allNames[$i]
            if ($hitFailed) {
              $st = "Skipped"
            } elseif ($failedList -contains $n) {
              $st = "Failed"
              $hitFailed = $true
            } else {
              $st = "Success"
            }
            $lines += "| $($allLabels[$i]) | ``$n`` | $st |"
          }

          if ($failedFiles -and $backupPath) {
            $lines += ""
            $lines += "---"
            $lines += "### Rollback"
            $lines += "``````sql"
            $lines += "ALTER DATABASE [$dbName] SET SINGLE_USER WITH ROLLBACK IMMEDIATE;"
            $lines += "RESTORE DATABASE [$dbName] FROM DISK = N'$backupPath' WITH REPLACE;"
            $lines += "ALTER DATABASE [$dbName] SET MULTI_USER;"
            $lines += "``````"
          }

          $lines -join "`n" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8
