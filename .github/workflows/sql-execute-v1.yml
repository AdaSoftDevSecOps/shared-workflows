name: SQL Script Executor

on:
  workflow_call:
    inputs:
      db_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
      backup_enabled:
        required: false
        type: boolean
        default: true
      script_path:
        required: false
        type: string
        default: '.'
      stop_on_error:
        required: false
        type: boolean
        default: true
      runner_label:
        required: true
        type: string

    secrets:
      SQL_HOST: { required: true }
      SQL_PORT: { required: true }
      SQL_USER: { required: true }
      SQL_PASSWORD: { required: true }
      SQL_BACKUP_PATH: { required: true }

jobs:
  execute-sql:
    name: "${{ inputs.project_name }} → ${{ inputs.db_name }}"
    runs-on: [self-hosted, windows, "${{ inputs.runner_label }}"]

    concurrency:
      group: sql-deploy-${{ inputs.runner_label }}-${{ inputs.db_name }}
      cancel-in-progress: false

    steps:
      # =====================================================
      # 1. Checkout
      # =====================================================
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: DEBUG List files
        shell: powershell
        run: |
          Write-Host "PWD: $(Get-Location)"
          Get-ChildItem -Recurse | Select-Object FullName

      # =====================================================
      # 2. Validate scripts
      # =====================================================
      - name: Validate script files
        id: validate
        shell: powershell
        env:
          SCRIPT_PATH: ${{ inputs.script_path }}
        run: |
          if ($env:SCRIPT_PATH -eq '.') {
            $scriptDir = (Get-Location).Path
          } else {
            $scriptDir = (Resolve-Path $env:SCRIPT_PATH).Path
          }
          $scripts = @(
            "Script-StoreBack-Structure.sql",
            "Script-StoreBack-Stored.sql",
            "Script-StoreBack-Data.sql"
          )
          
          Write-Host "::group::Validating scripts in '$scriptDir'"

          $foundList = @()

          foreach ($script in $scripts) {
            $fullPath = Join-Path $scriptDir $script
            if (Test-Path $fullPath) {
              $size = (Get-Item $fullPath).Length
              Write-Host "  [FOUND]   $script ($size bytes)"
              $foundList += $fullPath
            } else {
              Write-Host "  [MISSING] $script"
            }
          }

          if ($foundList.Count -eq 0) {
            echo "has_scripts=false" >> $env:GITHUB_OUTPUT
            Write-Host "::endgroup::"
            exit 0
          }

          echo "has_scripts=true" >> $env:GITHUB_OUTPUT
          echo "script_count=$($foundList.Count)" >> $env:GITHUB_OUTPUT

          $jsonItems = $foundList | ForEach-Object { '"' + ($_ -replace '\\', '\\') + '"' }
          $json = '[' + ($jsonItems -join ',') + ']'
          echo "script_list=$json" >> $env:GITHUB_OUTPUT

          Write-Host "::endgroup::"

      # =====================================================
      # 3. Verify connection
      # =====================================================
      - name: Verify SQL Server connection
        if: steps.validate.outputs.has_scripts == 'true'
        shell: powershell
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_PORT: ${{ secrets.SQL_PORT }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          DB_NAME: ${{ inputs.db_name }}
        run: |
          $server = "$env:SQL_HOST,$env:SQL_PORT"

          Write-Host "::group::Connecting to [$env:DB_NAME]"

          $result = sqlcmd `
            -S $server `
            -U $env:SQL_USER `
            -P $env:SQL_PASSWORD `
            -d $env:DB_NAME `
            -Q "SELECT @@SERVERNAME, DB_NAME()" `
            -W -h -1 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Connection failed"
            Write-Host $result
            exit 1
          }

          Write-Host "Connected: $result"
          Write-Host "::endgroup::"

      # =====================================================
      # 4. Backup
      # =====================================================
      - name: Backup database
        if: inputs.backup_enabled && steps.validate.outputs.has_scripts == 'true'
        id: backup
        shell: powershell
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_PORT: ${{ secrets.SQL_PORT }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          DB_NAME: ${{ inputs.db_name }}
          PROJECT_NAME: ${{ inputs.project_name }}
          BACKUP_BASE: ${{ secrets.SQL_BACKUP_PATH }}
        run: |
          $server    = "$env:SQL_HOST,$env:SQL_PORT"
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"

          $backupDir  = Join-Path $env:BACKUP_BASE $env:PROJECT_NAME
          $backupFile = "$($env:DB_NAME)_$timestamp.bak"
          $backupPath = Join-Path $backupDir $backupFile

          Write-Host "::group::Backup [$env:DB_NAME]"

          sqlcmd -S $server -U $env:SQL_USER -P $env:SQL_PASSWORD `
            -Q "EXEC master.dbo.xp_create_subdir N'$backupDir';"

          $sql = "BACKUP DATABASE [$env:DB_NAME] TO DISK = N'$backupPath' WITH INIT, COMPRESSION, CHECKSUM"

          $result = sqlcmd -S $server -U $env:SQL_USER -P $env:SQL_PASSWORD -Q $sql 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Backup failed"
            Write-Host $result
            exit 1
          }

          echo "backup_path=$backupPath" >> $env:GITHUB_OUTPUT
          Write-Host "::endgroup::"

      # =====================================================
      # 5. Execute scripts
      # =====================================================
      - name: Execute scripts
        if: steps.validate.outputs.has_scripts == 'true'
        id: execute
        shell: powershell
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_PORT: ${{ secrets.SQL_PORT }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          DB_NAME: ${{ inputs.db_name }}
          STOP_ON_ERROR: ${{ inputs.stop_on_error }}
          SCRIPT_LIST: ${{ steps.validate.outputs.script_list }}
        run: |
          $server = "$env:SQL_HOST,$env:SQL_PORT"
          $scripts = $env:SCRIPT_LIST | ConvertFrom-Json
          $stop = [System.Boolean]::Parse($env:STOP_ON_ERROR)

          $failed = @()

          foreach ($s in $scripts) {
            Write-Host "Running: $s"

            $result = sqlcmd `
              -S $server `
              -U $env:SQL_USER `
              -P $env:SQL_PASSWORD `
              -d $env:DB_NAME `
              -i $s `
              -b -r1 2>&1

            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::FAILED $s"
              Write-Host $result
              $failed += $s

              if ($stop) {
                echo "status=FAILED" >> $env:GITHUB_OUTPUT
                echo ("failed_files=" + ($failed -join ',')) >> $env:GITHUB_OUTPUT
                exit 1
              }
            }
          }

          if ($failed.Count -gt 0) {
            echo "status=PARTIAL_FAILURE" >> $env:GITHUB_OUTPUT
            echo ("failed_files=" + ($failed -join ',')) >> $env:GITHUB_OUTPUT
            exit 1
          }

          echo "status=SUCCESS" >> $env:GITHUB_OUTPUT

      # =====================================================
      # 6. Report
      # =====================================================
      - name: Report
        if: always() && steps.validate.outputs.has_scripts == 'true'
        shell: powershell
        env:
          STATUS: ${{ steps.execute.outputs.status }}
          BACKUP: ${{ steps.backup.outputs.backup_path }}
          FAILED: ${{ steps.execute.outputs.failed_files }}
          DB_NAME: ${{ inputs.db_name }}
          PROJECT: ${{ inputs.project_name }}
        run: |
          $lines = @()
          $lines += "## SQL Deployment Report"
          $lines += ""
          $lines += "| DB | $env:DB_NAME |"
          $lines += "| Project | $env:PROJECT |"
          $lines += "| Status | $env:STATUS |"
          $lines += "| Backup | $env:BACKUP |"

          if ($env:FAILED) {
            $lines += ""
            $lines += "### Failed"
            $lines += $env:FAILED
          }

          $lines -join "`n" | Out-File $env:GITHUB_STEP_SUMMARY -Encoding utf8
