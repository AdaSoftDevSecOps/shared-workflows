name: SQL Script Executor

on:
  workflow_call:
    inputs:
      db_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
      backup_enabled:
        required: false
        type: boolean
        default: true
      script_path:
        required: false
        type: string
        default: '.'
      stop_on_error:
        required: false
        type: boolean
        default: true
      runner_label:
        required: true
        type: string
      script_names:
        required: false
        type: string
        default: '[]'
        description: 'JSON array of script names to execute, e.g. ["Script-StoreBack-Structure.sql","Script-StoreBack-Stored.sql"]'

    secrets:
      SQL_HOST: { required: true }
      SQL_PORT: { required: true }
      SQL_USER: { required: true }
      SQL_PASSWORD: { required: true }
      SQL_BACKUP_PATH: { required: true }

jobs:
  execute-sql:
    name: "${{ inputs.project_name }} → ${{ inputs.db_name }}"
    runs-on: [self-hosted, windows, "${{ inputs.runner_label }}"]

    concurrency:
      group: sql-deploy-${{ inputs.runner_label }}-${{ inputs.db_name }}
      cancel-in-progress: false

    steps:
      # =====================================================
      # 1. Checkout with full history for merge detection
      # =====================================================
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DEBUG - Show commit info
        shell: powershell
        run: |
          Write-Host "Current commit: ${{ github.sha }}"
          Write-Host "Event name: ${{ github.event_name }}"
          Write-Host "Previous commit: ${{ github.event.before }}"
          Write-Host ""
          Write-Host "Commit history (last 3):"
          git log --oneline -3
          Write-Host ""
          Write-Host "Files in current commit:"
          git diff-tree --no-commit-id --name-only -r ${{ github.sha }}

      - name: Debug - List files and git status
        run: |
          Write-Host "Current directory: $(Get-Location)"
          Write-Host "Files in repo:"
          Get-ChildItem -Recurse -Filter "*.sql" | ForEach-Object { $_.FullName }
          Write-Host "`nGit status:"
          git status
          Write-Host "`nGit diff:"
          git diff --name-only ${{ github.event.before }} ${{ github.sha }}

      # =====================================================
      # 2. Detect changed scripts (handle merge commits)
      # =====================================================
      - name: Detect changed SQL scripts
        id: detect
        shell: powershell
        env:
          SCRIPT_PATH: ${{ inputs.script_path }}
          SCRIPT_NAMES_JSON: ${{ inputs.script_names }}
        run: |
          # Parse script names
          $allowedScripts = @()
          if ($env:SCRIPT_NAMES_JSON -and $env:SCRIPT_NAMES_JSON -ne '[]') {
            $allowedScripts = $env:SCRIPT_NAMES_JSON | ConvertFrom-Json
            Write-Host "Target scripts: $($allowedScripts -join ', ')"
          } else {
            Write-Host "No script_names provided"
            echo "has_scripts=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          
          # Get script directory
          if ($env:SCRIPT_PATH -eq '.') {
            $scriptDir = (Get-Location).Path
          } else {
            $scriptDir = (Resolve-Path $env:SCRIPT_PATH).Path
          }
          
          $scriptsToRun = @()
          
          Write-Host "::group::Detecting SQL script changes"
          
          # Case 1: workflow_dispatch - run all scripts
          if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') {
            Write-Host "Manual trigger - running all scripts"
            foreach ($script in $allowedScripts) {
              $fullPath = Join-Path $scriptDir $script
              if (Test-Path $fullPath) {
                Write-Host "  [INCLUDE]  $script (manual)"
                $scriptsToRun += $fullPath
              } else {
                Write-Host "  [MISSING]  $script"
              }
            }
          }
          else {
            # Push event - detailed detection
            $currentSha = "${{ github.sha }}"
            $previousSha = "${{ github.event.before }}"
            
            Write-Host "Current commit: $currentSha"
            Write-Host "Previous commit: $previousSha"
            Write-Host ""
            
            # Check if this is a merge commit
            $parentCount = git log -1 --format=%P $currentSha | ForEach-Object { ($_ -split ' ').Count }
            $isMergeCommit = $parentCount -gt 1
            
            if ($isMergeCommit) {
              Write-Host "🔀 Merge commit detected (parents: $parentCount)"
              Write-Host ""
              
              # For merge commit: compare content with each parent
              $parents = git log -1 --format=%P $currentSha
              $parentArray = $parents -split ' '
              
              foreach ($script in $allowedScripts) {
                $fullPath = Join-Path $scriptDir $script
                $relativePath = Join-Path $env:SCRIPT_PATH $script
                $relativePath = $relativePath -replace '\\', '/'
                
                if (Test-Path $fullPath) {
                  $currentContent = Get-Content $fullPath -Raw -ErrorAction SilentlyContinue
                  $changed = $false
                  
                  # Check against each parent
                  foreach ($parent in $parentArray) {
                    $parentContent = git show "$parent`:$relativePath" 2>&1
                    if ($LASTEXITCODE -eq 0 -and $parentContent -ne $currentContent) {
                      $changed = $true
                      Write-Host "  [CHANGED]  $script - Different from parent $parent"
                      break
                    }
                  }
                  
                  if ($changed) {
                    $scriptsToRun += $fullPath
                  } else {
                    Write-Host "  [SKIP]     $script - Same as all parents"
                  }
                } else {
                  Write-Host "  [MISSING]  $script"
                }
              }
            }
            else {
              # Normal commit - compare with parent
              Write-Host "📝 Normal commit detected"
              Write-Host ""
              
              if ($previousSha -and $previousSha -ne '0000000000000000000000000000000000000000') {
                # Has previous commit
                $changedFiles = git diff --name-only $previousSha $currentSha
                Write-Host "Changed files in this commit:"
                $changedFiles | ForEach-Object { Write-Host "  $_" }
                Write-Host ""
                
                foreach ($script in $allowedScripts) {
                  $fullPath = Join-Path $scriptDir $script
                  $relativePath = Join-Path $env:SCRIPT_PATH $script
                  $relativePath = $relativePath -replace '\\', '/'
                  
                  if (Test-Path $fullPath) {
                    if ($changedFiles -contains $relativePath -or $changedFiles -contains $script) {
                      Write-Host "  [CHANGED]  $script"
                      $scriptsToRun += $fullPath
                    } else {
                      Write-Host "  [SKIP]     $script"
                    }
                  } else {
                    Write-Host "  [MISSING]  $script"
                  }
                }
              }
              else {
                # First commit to branch
                Write-Host "First commit - running all scripts"
                foreach ($script in $allowedScripts) {
                  $fullPath = Join-Path $scriptDir $script
                  if (Test-Path $fullPath) {
                    Write-Host "  [INCLUDE]  $script (first commit)"
                    $scriptsToRun += $fullPath
                  }
                }
              }
            }
          }
          
          # Output results
          if ($scriptsToRun.Count -eq 0) {
            echo "has_scripts=false" >> $env:GITHUB_OUTPUT
            Write-Host ""
            Write-Host "✅ No SQL scripts need to be executed."
            Write-Host "::endgroup::"
            exit 0
          }
          
          echo "has_scripts=true" >> $env:GITHUB_OUTPUT
          echo "script_count=$($scriptsToRun.Count)" >> $env:GITHUB_OUTPUT
          
          $jsonItems = $scriptsToRun | ForEach-Object { '"' + ($_ -replace '\\', '\\') + '"' }
          $json = '[' + ($jsonItems -join ',') + ']'
          echo "script_list=$json" >> $env:GITHUB_OUTPUT
          
          $scriptNames = $scriptsToRun | ForEach-Object { Split-Path $_ -Leaf }
          echo "script_names=$($scriptNames -join ',')" >> $env:GITHUB_OUTPUT
          
          Write-Host ""
          Write-Host "🚀 Scripts to execute: $($scriptNames -join ', ')"
          Write-Host "::endgroup::"

      # =====================================================
      # 3. Verify SQL Server connection
      # =====================================================
      - name: Verify SQL Server connection
        if: steps.detect.outputs.has_scripts == 'true'
        shell: powershell
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_PORT: ${{ secrets.SQL_PORT }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          DB_NAME: ${{ inputs.db_name }}
        run: |
          $server = "$env:SQL_HOST,$env:SQL_PORT"

          Write-Host "::group::Connecting to [$env:DB_NAME]"

          $result = sqlcmd `
            -S $server `
            -U $env:SQL_USER `
            -P $env:SQL_PASSWORD `
            -d $env:DB_NAME `
            -Q "SELECT @@SERVERNAME, DB_NAME()" `
            -W -h -1 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Connection failed"
            Write-Host $result
            exit 1
          }

          Write-Host "Connected: $result"
          Write-Host "::endgroup::"

      # =====================================================
      # 4. Backup database
      # =====================================================
      - name: Backup database
        if: inputs.backup_enabled && steps.detect.outputs.has_scripts == 'true'
        id: backup
        shell: powershell
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_PORT: ${{ secrets.SQL_PORT }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          DB_NAME: ${{ inputs.db_name }}
          PROJECT_NAME: ${{ inputs.project_name }}
          BACKUP_BASE: ${{ secrets.SQL_BACKUP_PATH }}
        run: |
          $server    = "$env:SQL_HOST,$env:SQL_PORT"
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"

          $backupDir  = Join-Path $env:BACKUP_BASE $env:PROJECT_NAME
          $backupFile = "$($env:DB_NAME)_$timestamp.bak"
          $backupPath = Join-Path $backupDir $backupFile

          Write-Host "::group::Backup [$env:DB_NAME]"

          # Create backup directory if not exists
          sqlcmd -S $server -U $env:SQL_USER -P $env:SQL_PASSWORD `
            -Q "EXEC master.dbo.xp_create_subdir N'$backupDir';" 2>&1 | Out-Null

          $sql = "BACKUP DATABASE [$env:DB_NAME] TO DISK = N'$backupPath' WITH INIT, COMPRESSION, CHECKSUM"

          $result = sqlcmd -S $server -U $env:SQL_USER -P $env:SQL_PASSWORD -Q $sql 2>&1

          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::Backup failed"
            Write-Host $result
            exit 1
          }

          echo "backup_path=$backupPath" >> $env:GITHUB_OUTPUT
          Write-Host "Backup created: $backupPath"
          Write-Host "::endgroup::"

      # =====================================================
      # 5. Execute scripts
      # =====================================================
      - name: Execute scripts
        if: steps.detect.outputs.has_scripts == 'true'
        id: execute
        shell: powershell
        env:
          SQL_HOST: ${{ secrets.SQL_HOST }}
          SQL_PORT: ${{ secrets.SQL_PORT }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          DB_NAME: ${{ inputs.db_name }}
          STOP_ON_ERROR: ${{ inputs.stop_on_error }}
          SCRIPT_LIST: ${{ steps.detect.outputs.script_list }}
        run: |
          $server = "$env:SQL_HOST,$env:SQL_PORT"
          $scripts = $env:SCRIPT_LIST | ConvertFrom-Json
          $stop = [System.Boolean]::Parse($env:STOP_ON_ERROR)

          $failed = @()
          $executed = @()

          Write-Host "::group::Executing SQL scripts"
          Write-Host "Database: $env:DB_NAME"
          Write-Host "Stop on error: $stop"
          Write-Host ""

          foreach ($s in $scripts) {
            $scriptName = Split-Path $s -Leaf
            Write-Host "▶ Running: $scriptName"
            Write-Host "  Path: $s"

            $result = sqlcmd `
              -S $server `
              -U $env:SQL_USER `
              -P $env:SQL_PASSWORD `
              -d $env:DB_NAME `
              -i $s `
              -f 65001 `
              -b -r1 2>&1

            if ($LASTEXITCODE -ne 0) {
              Write-Host "  ✗ FAILED with exit code: $LASTEXITCODE"
              Write-Host "  Error: $result"
              $failed += $scriptName

              if ($stop) {
                echo "status=FAILED" >> $env:GITHUB_OUTPUT
                echo ("failed_files=" + ($failed -join ',')) >> $env:GITHUB_OUTPUT
                Write-Host "::error::Stopping due to stop_on_error=true"
                Write-Host "::endgroup::"
                exit 1
              }
            } else {
              Write-Host "  ✓ SUCCESS"
              $executed += $scriptName
            }
            Write-Host ""
          }

          if ($failed.Count -gt 0) {
            echo "status=PARTIAL_FAILURE" >> $env:GITHUB_OUTPUT
            echo ("failed_files=" + ($failed -join ',')) >> $env:GITHUB_OUTPUT
            echo ("executed_files=" + ($executed -join ',')) >> $env:GITHUB_OUTPUT
            Write-Host "::endgroup::"
            exit 1
          }

          echo "status=SUCCESS" >> $env:GITHUB_OUTPUT
          echo ("executed_files=" + ($executed -join ',')) >> $env:GITHUB_OUTPUT
          Write-Host "::endgroup::"

      # =====================================================
      # 6. Report
      # =====================================================
      - name: Report
        if: always() && steps.detect.outputs.has_scripts == 'true'
        shell: powershell
        env:
          STATUS: ${{ steps.execute.outputs.status }}
          BACKUP: ${{ steps.backup.outputs.backup_path }}
          FAILED: ${{ steps.execute.outputs.failed_files }}
          EXECUTED: ${{ steps.execute.outputs.executed_files }}
          SCRIPT_NAMES: ${{ steps.detect.outputs.script_names }}
          DB_NAME: ${{ inputs.db_name }}
          PROJECT: ${{ inputs.project_name }}
        run: |
          $lines = @()
          $lines += "## SQL Deployment Report"
          $lines += ""
          $lines += "| **Database** | $env:DB_NAME |"
          $lines += "| **Project** | $env:PROJECT |"
          $lines += "| **Status** | $env:STATUS |"
          
          if ($env:EXECUTED) {
            $lines += "| **Executed Scripts** | $env:EXECUTED |"
          }
          
          if ($env:BACKUP) {
            $lines += "| **Backup Path** | $env:BACKUP |"
          } else {
            $lines += "| **Backup** | Skipped (disabled or no scripts) |"
          }

          if ($env:FAILED) {
            $lines += ""
            $lines += "### ❌ Failed Scripts"
            $lines += "```"
            $lines += $env:FAILED
            $lines += "```"
          }

          if ($env:STATUS -eq "SUCCESS") {
            $lines += ""
            $lines += "### ✅ Deployment completed successfully"
          } elseif ($env:STATUS -eq "PARTIAL_FAILURE") {
            $lines += ""
            $lines += "### ⚠️ Partial failure - some scripts failed"
          } elseif ($env:STATUS -ne "SUCCESS" -and $env:STATUS) {
            $lines += ""
            $lines += "### ❌ Deployment failed"
          }

          $lines -join "`n" | Out-File $env:GITHUB_STEP_SUMMARY -Encoding utf8
          
          Write-Host "Report generated"
          Write-Host "Status: $env:STATUS"
