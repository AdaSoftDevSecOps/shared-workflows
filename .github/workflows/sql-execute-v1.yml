name: SQL Execute Workflow

on:
  workflow_call:
    inputs:
      db_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
      backup_enabled:
        required: false
        type: boolean
        default: true
      script_path:
        required: false
        type: string
        default: "."
      stop_on_error:
        required: false
        type: boolean
        default: true
      script_names:
        required: true
        type: string
        description: 'JSON array of allowed script names e.g. ["script1.sql","script2.sql"]'
    secrets:
      SQL_HOST:
        required: true
      SQL_PORT:
        required: true
      SQL_USER:
        required: true
      SQL_PASSWORD:
        required: true
      SQL_BACKUP_PATH:
        required: false

jobs:
  execute-sql:
    runs-on: [self-hosted, ${{ inputs.runner_label }}]
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # fetch ล่าสุด 2 commits ก็พอ

      - name: Detect changed SQL files
        id: detect
        shell: pwsh
        run: |
          $scriptDir = if ("${{ inputs.script_path }}" -eq '.') { 
              (Get-Location).Path 
          } else { 
              (Resolve-Path "${{ inputs.script_path }}").Path 
          }
          
          # อ่านรายชื่อไฟล์ที่อนุญาต
          $allowedScripts = '${{ inputs.script_names }}' | ConvertFrom-Json
          
          # หาไฟล์ SQL ที่เปลี่ยนแปลงใน commit นี้
          $currentSha = "${{ github.sha }}"
          $previousSha = "${{ github.event.before }}"
          
          Write-Host "::group::🔍 Detecting changed SQL files"
          Write-Host "Current commit: $currentSha"
          Write-Host "Previous commit: $previousSha"
          Write-Host "Allowed scripts: $($allowedScripts -join ', ')"
          Write-Host ""
          
          $changedFiles = @()
          
          # กรณี first commit
          if ($previousSha -eq "0000000000000000000000000000000000000000") {
              Write-Host "First commit - checking all files in this commit"
              $changedFiles = git diff-tree --no-commit-id --name-only -r $currentSha
          } else {
              # ปกติ: เปรียบเทียบกับ commit ก่อนหน้า
              $changedFiles = git diff --name-only $previousSha $currentSha
          }
          
          # กรองเฉพาะไฟล์ .sql
          $sqlFiles = $changedFiles | Where-Object { $_ -like "*.sql" }
          
          Write-Host "SQL files changed in this commit:"
          if ($sqlFiles.Count -eq 0) {
              Write-Host "  (none)"
          } else {
              $sqlFiles | ForEach-Object { Write-Host "  • $_" }
          }
          Write-Host ""
          
          # ตรวจสอบว่าไฟล์ที่เปลี่ยนอยู่ในรายการที่อนุญาตหรือไม่
          $scriptsToRun = @()
          foreach ($file in $sqlFiles) {
              $fileName = Split-Path $file -Leaf
              if ($allowedScripts -contains $fileName) {
                  $fullPath = Join-Path $scriptDir $fileName
                  if (Test-Path $fullPath) {
                      Write-Host "  ✅ [ALLOWED] $fileName - will run"
                      $scriptsToRun += $fullPath
                  } else {
                      Write-Host "  ⚠️ [NOT FOUND] $fileName - file not found in $scriptDir"
                  }
              } else {
                  Write-Host "  ❌ [NOT ALLOWED] $fileName - skipping (not in script_names)"
              }
          }
          
          Write-Host ""
          Write-Host "::endgroup::"
          
          # ตั้งค่า outputs
          if ($scriptsToRun.Count -gt 0) {
              "has_scripts=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              "script_count=$($scriptsToRun.Count)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              
              # JSON array ของ paths
              $jsonPaths = $scriptsToRun | ForEach-Object { 
                  '"' + ($_ -replace '\\', '\\') + '"' 
              }
              "script_list=[$($jsonPaths -join ',')]" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              
              # รายชื่อไฟล์ (คั่นด้วย comma)
              $scriptNames = $scriptsToRun | ForEach-Object { Split-Path $_ -Leaf }
              "script_names=$($scriptNames -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              
              Write-Host "::group::🚀 Scripts to execute"
              $scriptNames | ForEach-Object { Write-Host "  • $_" }
              Write-Host "::endgroup::"
          } else {
              "has_scripts=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "✅ No allowed SQL files to execute"
          }

      - name: Backup database (optional)
        if: inputs.backup_enabled == true && steps.detect.outputs.has_scripts == 'true'
        shell: pwsh
        run: |
          $backupPath = "${{ secrets.SQL_BACKUP_PATH }}"
          if ([string]::IsNullOrEmpty($backupPath)) {
              $backupPath = "C:\SQLBackups"
          }
          
          if (-not (Test-Path $backupPath)) {
              New-Item -ItemType Directory -Path $backupPath -Force
          }
          
          $dbName = "${{ inputs.db_name }}"
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $backupFile = "$backupPath\${dbName}_$timestamp.bak"
          
          Write-Host "Creating backup: $backupFile"
          
          $query = "BACKUP DATABASE [$dbName] TO DISK = '$backupFile' WITH FORMAT, INIT, SKIP, NOREWIND, NOUNLOAD, STATS = 10"
          sqlcmd -S "${{ secrets.SQL_HOST }},${{ secrets.SQL_PORT }}" `
                 -U "${{ secrets.SQL_USER }}" `
                 -P "${{ secrets.SQL_PASSWORD }}" `
                 -Q "$query" `
                 -b
          
          if ($LASTEXITCODE -eq 0) {
              Write-Host "✅ Backup completed"
              "backup_path=$backupFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
              Write-Host "⚠️ Backup failed, continuing anyway..."
          }

      - name: Execute SQL scripts
        if: steps.detect.outputs.has_scripts == 'true'
        id: execute
        shell: pwsh
        run: |
          $scriptList = '${{ steps.detect.outputs.script_list }}' | ConvertFrom-Json
          $failedScripts = @()
          $executedScripts = @()
          $currentIndex = 0
          $totalScripts = $scriptList.Count
          
          Write-Host "::group::📝 Executing SQL scripts"
          Write-Host "Total scripts to execute: $totalScripts"
          Write-Host ""
          
          foreach ($script in $scriptList) {
              $currentIndex++
              $scriptName = Split-Path $script -Leaf
              Write-Host "[$currentIndex/$totalScripts] Running: $scriptName"
              
              $output = sqlcmd -S "${{ secrets.SQL_HOST }},${{ secrets.SQL_PORT }}" `
                               -U "${{ secrets.SQL_USER }}" `
                               -P "${{ secrets.SQL_PASSWORD }}" `
                               -d "${{ inputs.db_name }}" `
                               -i "$script" `
                               -b `
                               -r1 `
                               2>&1
              
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "  ✅ Success: $scriptName"
                  $executedScripts += $scriptName
              } else {
                  Write-Host "  ❌ Failed: $scriptName"
                  if ($output) {
                      Write-Host "  Error: $output"
                  }
                  $failedScripts += $scriptName
                  
                  if ("${{ inputs.stop_on_error }}" -eq 'true') {
                      Write-Host ""
                      Write-Host "⚠️ Stopping due to error"
                      break
                  }
              }
              Write-Host ""
          }
          
          Write-Host "::endgroup::"
          
          # Summary
          Write-Host "::group::📊 Execution Summary"
          Write-Host "Success: $($executedScripts.Count)/$totalScripts"
          if ($failedScripts.Count -gt 0) {
              Write-Host "Failed: $($failedScripts -join ', ')"
          }
          Write-Host "::endgroup::"
          
          "executed_files=$($executedScripts -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "failed_files=$($failedScripts -join ',')" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          
          if ($failedScripts.Count -gt 0) {
              "status=failed" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 1
          } else {
              "status=success" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
              Write-Host "✅ All scripts executed successfully"
          }

      - name: Report
        if: always() && steps.detect.outputs.has_scripts == 'true'
        shell: pwsh
        run: |
          Write-Host "::group::📋 Deployment Report"
          Write-Host "Database: ${{ inputs.db_name }}"
          Write-Host "Project: ${{ inputs.project_name }}"
          Write-Host "Status: ${{ steps.execute.outputs.status }}"
          Write-Host "Executed: ${{ steps.execute.outputs.executed_files }}"
          if ("${{ steps.execute.outputs.failed_files }}") {
              Write-Host "Failed: ${{ steps.execute.outputs.failed_files }}"
          }
          Write-Host "::endgroup::"
