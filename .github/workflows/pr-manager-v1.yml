name: "[Reusable] PR Manager"

on:
  workflow_call:
    inputs:
      # ──────────────────────────────────────────────────────
      # PR Configuration
      # ──────────────────────────────────────────────────────
      project-name:
        description: "ชื่อโปรเจค (ใช้ใน title PR)"
        required: true
        type: string

      source-branch:
        description: "ต้นทาง branch (default: dev)"
        required: false
        type: string
        default: "dev"

      target-branch:
        description: "ปลายทาง branch (default: sit)"
        required: false
        type: string
        default: "sit"

      # ──────────────────────────────────────────────────────
      # PR Behavior
      # ──────────────────────────────────────────────────────
      auto-update-existing:
        description: "Auto update existing PR (true/false)"
        required: false
        type: string
        default: "true"

      # ──────────────────────────────────────────────────────
      # Assignees & Reviewers
      # ──────────────────────────────────────────────────────
      assignees:
        description: "GitHub users to assign (comma separated). Leave empty to auto-assign from first commit author"
        required: false
        type: string
        default: ""

      reviewers:
        description: "Required reviewers (comma separated)"
        required: false
        type: string
        default: ""

      labels:
        description: "PR labels (comma separated)"
        required: false
        type: string
        default: "auto-pr,needs-review"

      # ──────────────────────────────────────────────────────
      # Auto Merge (Optional)
      # ──────────────────────────────────────────────────────
      merge-method:
        description: "Merge method: merge, squash, rebase"
        required: false
        type: string
        default: "merge"

      # ──────────────────────────────────────────────────────
      # Notifications
      # ──────────────────────────────────────────────────────
      notify-on-pr-created:
        description: "Send notification when PR created"
        required: false
        type: string
        default: "false"

      notification-webhook:
        description: "Webhook URL for notifications (Slack/Teams/LINE)"
        required: false
        type: string
        default: ""

    secrets:
      github-token:
        description: "GitHub token for PR operations"
        required: true

    outputs:
      pr_number:
        description: "PR number created/updated"
        value: ${{ jobs.manage-pr.outputs.pr_number }}
      pr_url:
        description: "PR URL"
        value: ${{ jobs.manage-pr.outputs.pr_url }}
      action:
        description: "Action performed: created, updated, none"
        value: ${{ jobs.manage-pr.outputs.action }}

jobs:
  manage-pr:
    name: "Manage PR: ${{ inputs.source-branch }} → ${{ inputs.target-branch }}"
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr-output.outputs.pr_number }}
      pr_url: ${{ steps.pr-output.outputs.pr_url }}
      action: ${{ steps.pr-output.outputs.action }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source-branch }}
          token: ${{ secrets.github-token }}

      - name: Get commit information (only new commits not in target)
        id: commits
        shell: bash
        run: |
          # Force fetch latest target branch state
          git fetch origin ${{ inputs.target-branch }} --depth=100
          git fetch origin ${{ inputs.source-branch }} --depth=100
          
          # Get commits that are in source but NOT in target
          # This correctly handles merge history and won't show old commits
          COMMITS=$(git log origin/${{ inputs.target-branch }}..HEAD --oneline --no-merges)
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c '^' || echo "0")
          
          # Also get full list including merges for reference
          FULL_COMMITS=$(git log origin/${{ inputs.target-branch }}..HEAD --oneline)
          TOTAL_COUNT=$(echo "$FULL_COMMITS" | grep -c '^' || echo "0")
          
          echo "count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "full_list<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          
          # Latest commit info
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            LATEST_SHA=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges -1 --pretty=%h)
            LATEST_MSG=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges -1 --pretty=%s)
            LATEST_AUTHOR=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges -1 --pretty=%an)
            
            # Get the FIRST commit's author (oldest new commit) for auto-assign
            FIRST_AUTHOR_NAME=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges --reverse -1 --pretty=%an)
            FIRST_AUTHOR_EMAIL=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges --reverse -1 --pretty=%ae)
            FIRST_AUTHOR_USERNAME=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges --reverse -1 --pretty=%an | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          else
            LATEST_SHA="none"
            LATEST_MSG="none"
            LATEST_AUTHOR="none"
            FIRST_AUTHOR_NAME="none"
            FIRST_AUTHOR_EMAIL="none"
            FIRST_AUTHOR_USERNAME="none"
          fi
          
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "latest_msg=$LATEST_MSG" >> $GITHUB_OUTPUT
          echo "latest_author=$LATEST_AUTHOR" >> $GITHUB_OUTPUT
          echo "first_author_name=$FIRST_AUTHOR_NAME" >> $GITHUB_OUTPUT
          echo "first_author_email=$FIRST_AUTHOR_EMAIL" >> $GITHUB_OUTPUT
          echo "first_author_username=$FIRST_AUTHOR_USERNAME" >> $GITHUB_OUTPUT
          
          echo "📊 Found $COMMIT_COUNT new commits (not in target branch)"
          echo "📊 Total commits in range: $TOTAL_COUNT"
          echo "👤 First commit author: $FIRST_AUTHOR_NAME"

      - name: Resolve assignees (auto-detect if empty)
        id: assignees
        if: steps.commits.outputs.count != '0'
        shell: bash
        run: |
          if [ -n "${{ inputs.assignees }}" ]; then
            # Use specified assignees
            ASSIGNEES="${{ inputs.assignees }}"
            echo "method=manual" >> $GITHUB_OUTPUT
          else
            # Try to find GitHub username from commit author info
            FIRST_AUTHOR_NAME="${{ steps.commits.outputs.first_author_name }}"
            FIRST_AUTHOR_EMAIL="${{ steps.commits.outputs.first_author_email }}"
            
            echo "🔍 Auto-detecting assignee from first commit..."
            echo "👤 Author name: $FIRST_AUTHOR_NAME"
            echo "📧 Author email: $FIRST_AUTHOR_EMAIL"
            
            # Try to find GitHub username by searching commits
            # Look for the most recent commits by this author to find their GitHub username
            AUTHOR_USERNAME=$(git log --all --author="$FIRST_AUTHOR_EMAIL" --pretty="%an <%ae>" -1 2>/dev/null || echo "")
            
            # Alternative: try to extract from email (if it's a GitHub noreply email)
            if [[ "$FIRST_AUTHOR_EMAIL" =~ ^([0-9]+\+)?([^@]+)@users\.noreply\.github\.com$ ]]; then
              ASSIGNEES="${BASH_REMATCH[2]}"
              echo "method=email_parsed" >> $GITHUB_OUTPUT
            else
              # Use the author name as a potential GitHub username
              # Convert to lowercase and special handling
              ASSIGNEES="$FIRST_AUTHOR_NAME"
              echo "method=name_based" >> $GITHUB_OUTPUT
            fi
            
            echo "🎯 Auto-assigned: $ASSIGNEES"
          fi
          
          echo "assignees=$ASSIGNEES" >> $GITHUB_OUTPUT
          
          # Log assignment info
          echo "## 👤 Assignee Resolution" >> $GITHUB_STEP_SUMMARY
          echo "- **Method**: ${{ steps.assignees.outputs.method || 'manual' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Assignees**: \`$ASSIGNEES\`" >> $GITHUB_STEP_SUMMARY

      - name: Skip if no new commits
        if: steps.commits.outputs.count == '0'
        shell: bash
        run: |
          echo "ℹ️ No new commits to merge. Skipping PR creation/update."
          echo "action=none" >> $GITHUB_OUTPUT
          
          echo "## PR Management Result" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Skipped (no new commits)" >> $GITHUB_STEP_SUMMARY
          echo "- Source branch is already up to date with target" >> $GITHUB_STEP_SUMMARY

      - name: Check existing PR
        id: check
        if: steps.commits.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          EXISTING_PR=$(gh pr list \
            --base ${{ inputs.target-branch }} \
            --head ${{ inputs.source-branch }} \
            --state open \
            --json number,url,title \
            --jq '.[0]')
          
          if [ -n "$EXISTING_PR" ]; then
            PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "Found existing PR #$PR_NUMBER" >> $GITHUB_STEP_SUMMARY
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No existing PR found" >> $GITHUB_STEP_SUMMARY
          fi
          
      - name: Create or Update PR
        id: pr
        if: steps.commits.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          # Build PR body with commit list (only new commits)
          PR_BODY=$(cat <<'EOF'
          ## 🚀 Deployment Request: ${{ inputs.project-name }}
          
          | รายละเอียด | ข้อมูล |
          |-----------|--------|
          | **โปรเจค** | ${{ inputs.project-name }} |
          | **ต้นทาง** | `${{ inputs.source-branch }}` |
          | **ปลายทาง** | `${{ inputs.target-branch }}` |
          | **จำนวน commits** | ${{ steps.commits.outputs.count }} |
          | **Commit ล่าสุด** | ${{ steps.commits.outputs.latest_sha }} |
          | **ผู้พัฒนา** | ${{ steps.commits.outputs.latest_author }} |
          | **ผู้รับผิดชอบ** | ${{ steps.assignees.outputs.assignees }} |
          
          ---
          
          ### 📝 รายการ commits:
          ${{ steps.commits.outputs.list }}   
          
          ---

          ### ✅ ขั้นตอนการดำเนินการ:

          1. Review การเปลี่ยนแปลงข้างต้น
          2. Approve PR นี้
          3. Merge เพื่อ deploy ไปยัง ${{ inputs.target-branch }}

          *🤖 PR นี้ถูกสร้าง/อัพเดทโดยอัตโนมัติ*
          EOF
          )

          # Create title with commit count
          PR_TITLE="[${{ inputs.project-name }}] ${{ inputs.source-branch }} → ${{ inputs.target-branch }} (${{ steps.commits.outputs.count }} commit(s))"

          if [ "${{ steps.check.outputs.exists }}" == "true" ]; then
            if [ "${{ inputs.auto-update-existing }}" == "true" ]; then
              # Update existing PR
              echo "🔄 Updating existing PR #${{ steps.check.outputs.pr_number }}"
              
              gh pr edit ${{ steps.check.outputs.pr_number }} \
                --title "$PR_TITLE" \
                --body "$PR_BODY"
              
              # Update assignees if auto-detect is enabled
              if [ -z "${{ inputs.assignees }}" ] && [ -n "${{ steps.assignees.outputs.assignees }}" ]; then
                echo "👤 Updating assignee to ${{ steps.assignees.outputs.assignees }}"
                gh pr edit ${{ steps.check.outputs.pr_number }} \
                  --add-assignee "${{ steps.assignees.outputs.assignees }}"
              fi
              
              echo "action=updated" >> $GITHUB_OUTPUT
              echo "pr_number=${{ steps.check.outputs.pr_number }}" >> $GITHUB_OUTPUT
              echo "pr_url=${{ steps.check.outputs.pr_url }}" >> $GITHUB_OUTPUT
              
              # Add comment about new commits
              if [ "${{ steps.commits.outputs.count }}" -gt 0 ]; then
                gh pr comment ${{ steps.check.outputs.pr_number }} \
                  --body "📌 **อัพเดท**: มี commit ใหม่ ${{ steps.commits.outputs.count }} รายการ"
              fi
            else
              echo "action=none" >> $GITHUB_OUTPUT
              echo "ℹ️ Auto-update is disabled, skipping PR update"
            fi
          else
            # Create new PR - แก้ไขใหม่ไม่ใช้ eval
            echo "✨ Creating new PR"
            
            # สร้าง array ของ arguments สำหรับ gh pr create
            PR_ARGS=(
              --base "${{ inputs.target-branch }}"
              --head "${{ inputs.source-branch }}"
              --title "$PR_TITLE"
              --body "$PR_BODY"
            )
            
            # เพิ่ม assignee ถ้ามี
            if [ -n "${{ steps.assignees.outputs.assignees }}" ]; then
              PR_ARGS+=(--assignee "${{ steps.assignees.outputs.assignees }}")
            fi
            
            # เพิ่ม reviewer ถ้ามี
            if [ -n "${{ inputs.reviewers }}" ]; then
              PR_ARGS+=(--reviewer "${{ inputs.reviewers }}")
            fi
            
            # เพิ่ม label ถ้ามี
            if [ -n "${{ inputs.labels }}" ]; then
              PR_ARGS+=(--label "${{ inputs.labels }}")
            fi
            
            # Execute gh pr create with proper arguments
            PR_URL=$(gh pr create "${PR_ARGS[@]}" 2>&1)
            CREATE_EXIT_CODE=$?
            
            if [ $CREATE_EXIT_CODE -ne 0 ]; then
              echo "❌ Failed to create PR"
              echo "Error: $PR_URL"
              exit 1
            fi
            
            # Extract PR number from URL
            # gh pr create returns URL in format: https://github.com/owner/repo/pull/NUMBER
            PR_NUMBER=$(echo "$PR_URL" | grep -oP 'https://github\.com/[^/]+/[^/]+/pull/\K\d+')
            
            if [ -z "$PR_NUMBER" ]; then
              echo "❌ Could not extract PR number from URL: $PR_URL"
              exit 1
            fi
            
            echo "action=created" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            
            echo "✅ PR created: $PR_URL"
            echo "✅ PR number: $PR_NUMBER"
          fi

