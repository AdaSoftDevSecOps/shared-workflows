      ;       echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            
      ;       echo "✅ PR created: $PR_URL"
      ;     fi

      - name: Send notification (if enabled)
        if: inputs.notify-on-pr-created == 'true' && steps.pr.outputs.action != 'none'
        shell: bash
        run: |
          if [ -n "${{ inputs.notification-webhook }}" ]; then
            curl -X POST "${{ inputs.notification-webhook }}" \
              -H "Content-Type: application/json" \
              -d '{
                "text": "📋 PR ${{ steps.pr.outputs.action }}: ${{ steps.pr.outputs.pr_url }}",
                "project": "${{ inputs.project-name }}",
                "commits": ${{ steps.commits.outputs.count }},
                "source": "${{ inputs.source-branch }}",
                "target": "${{ inputs.target-branch }}",
                "assignee": "${{ steps.assignees.outputs.assignees }}"
              }' || true
          fi

      - name: Output PR info
        id: pr-output
        shell: bash
        run: |
          # Set outputs
          echo "pr_number=${{ steps.pr.outputs.pr_number }}" >> $GITHUB_OUTPUT
          echo "pr_url=${{ steps.pr.outputs.pr_url }}" >> $GITHUB_OUTPUT
          echo "action=${{ steps.pr.outputs.action }}" >> $GITHUB_OUTPUT
          
          # Create detailed step summary
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## 📋 PR Management Result
          
          | รายการ | ผลลัพธ์ |
          |--------|---------|
          | **Action** | ${{ steps.pr.outputs.action }} |
          | **New Commits** | ${{ steps.commits.outputs.count }} |
          | **PR Number** | #${{ steps.pr.outputs.pr_number }} |
          | **PR URL** | ${{ steps.pr.outputs.pr_url }} |
          | **Assignee** | ${{ steps.assignees.outputs.assignees }} |
          | **Assignee Method** | ${{ steps.assignees.outputs.method || 'manual' }} |
          
          ---
          
          ### 📝 Commits in this PR
          
          \`\`\`
          ${{ steps.commits.outputs.list }}
          \`\`\`
          
          ---
          
          ### 👤 Auto-Assignment Logic:
          
          - **First commit author**: ${{ steps.commits.outputs.first_author_name }}
          - **Author email**: ${{ steps.commits.outputs.first_author_email }}
          - **Resolved username**: ${{ steps.assignees.outputs.assignees }}
          - **Method used**: ${{ steps.assignees.outputs.method || 'manual' }}
          
          *🤖 Auto-assignment triggered because no manual assignees were specified*
          EOF
