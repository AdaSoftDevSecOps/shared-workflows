name: "[Reusable] PR Manager"

on:
  workflow_call:
    inputs:
      # ──────────────────────────────────────────────────────
      # PR Configuration
      # ──────────────────────────────────────────────────────
      project-name:
        description: "ชื่อโปรเจค (ใช้ใน title PR)"
        required: true
        type: string

      source-branch:
        description: "ต้นทาง branch (default: dev)"
        required: false
        type: string
        default: "dev"

      target-branch:
        description: "ปลายทาง branch (default: sit)"
        required: false
        type: string
        default: "sit"

      # ──────────────────────────────────────────────────────
      # PR Behavior
      # ──────────────────────────────────────────────────────
      auto-update-existing:
        description: "Auto update existing PR (true/false)"
        required: false
        type: string
        default: "true"

      delete-on-merge:
        description: "ลบ source branch เมื่อ merge แล้ว (true/false)"
        required: false
        type: string
        default: "false"

      # ──────────────────────────────────────────────────────
      # Assignees & Reviewers
      # ──────────────────────────────────────────────────────
      assignees:
        description: "GitHub users to assign (comma separated)"
        required: false
        type: string
        default: ""

      reviewers:
        description: "Required reviewers (comma separated)"
        required: false
        type: string
        default: ""

      labels:
        description: "PR labels (comma separated)"
        required: false
        type: string
        default: "auto-pr,needs-review"

      # ──────────────────────────────────────────────────────
      # Auto Merge Configuration ⭐ NEW ⭐
      # ──────────────────────────────────────────────────────
      auto-merge-on-approve:
        description: "Auto merge when PR is approved (true/false) - Tester only needs Triage permission"
        required: false
        type: string
        default: "true"

      merge-method:
        description: "Merge method: merge, squash, rebase"
        required: false
        type: string
        default: "merge"

      required-approvals:
        description: "Number of required approvals before auto-merge"
        required: false
        type: number
        default: 1

      wait-for-ci:
        description: "Wait for CI checks to pass before auto-merge (true/false)"
        required: false
        type: string
        default: "false"

      # ──────────────────────────────────────────────────────
      # Notifications
      # ──────────────────────────────────────────────────────
      notify-on-pr-created:
        description: "Send notification when PR created"
        required: false
        type: string
        default: "false"

      notification-webhook:
        description: "Webhook URL for notifications (Slack/Teams/LINE)"
        required: false
        type: string
        default: ""

      notify-on-merge:
        description: "Send notification when PR merged"
        required: false
        type: string
        default: "true"

    secrets:
      github-token:
        description: "GitHub token for PR operations"
        required: true

    outputs:
      pr_number:
        description: "PR number created/updated"
        value: ${{ jobs.manage-pr.outputs.pr_number }}
      pr_url:
        description: "PR URL"
        value: ${{ jobs.manage-pr.outputs.pr_url }}
      action:
        description: "Action performed: created, updated, merged, none"
        value: ${{ jobs.manage-pr.outputs.action }}
      merged:
        description: "Whether PR was auto-merged"
        value: ${{ jobs.manage-pr.outputs.merged }}

jobs:
  manage-pr:
    name: "Manage PR: ${{ inputs.source-branch }} → ${{ inputs.target-branch }}"
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.final-output.outputs.pr_number }}
      pr_url: ${{ steps.final-output.outputs.pr_url }}
      action: ${{ steps.final-output.outputs.action }}
      merged: ${{ steps.final-output.outputs.merged }}
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.source-branch }}
          token: ${{ secrets.github-token }}

      - name: Get commit information (only new commits not in target)
        id: commits
        shell: bash
        run: |
          # Force fetch latest target branch state
          git fetch origin ${{ inputs.target-branch }} --depth=100
          git fetch origin ${{ inputs.source-branch }} --depth=100
          
          # Get commits that are in source but NOT in target
          COMMITS=$(git log origin/${{ inputs.target-branch }}..HEAD --oneline --no-merges)
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c '^' || echo "0")
          
          # Also get full list including merges for reference
          FULL_COMMITS=$(git log origin/${{ inputs.target-branch }}..HEAD --oneline)
          TOTAL_COUNT=$(echo "$FULL_COMMITS" | grep -c '^' || echo "0")
          
          echo "count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "full_list<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "total_count=$TOTAL_COUNT" >> $GITHUB_OUTPUT
          
          # Latest commit info
          if [ "$COMMIT_COUNT" -gt 0 ]; then
            LATEST_SHA=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges -1 --pretty=%h)
            LATEST_MSG=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges -1 --pretty=%s)
            LATEST_AUTHOR=$(git log origin/${{ inputs.target-branch }}..HEAD --no-merges -1 --pretty=%an)
          else
            LATEST_SHA="none"
            LATEST_MSG="none"
            LATEST_AUTHOR="none"
          fi
          
          echo "latest_sha=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "latest_msg=$LATEST_MSG" >> $GITHUB_OUTPUT
          echo "latest_author=$LATEST_AUTHOR" >> $GITHUB_OUTPUT
          
          echo "📊 Found $COMMIT_COUNT new commits (not in target branch)"
          echo "📊 Total commits in range: $TOTAL_COUNT"

      - name: Skip if no new commits
        if: steps.commits.outputs.count == '0'
        shell: bash
        run: |
          echo "ℹ️ No new commits to merge. Skipping PR creation/update."
          echo "action=none" >> $GITHUB_OUTPUT
          echo "merged=false" >> $GITHUB_OUTPUT
          
          echo "## PR Management Result" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Skipped (no new commits)" >> $GITHUB_STEP_SUMMARY

      - name: Check existing PR
        id: check
        if: steps.commits.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          EXISTING_PR=$(gh pr list \
            --base ${{ inputs.target-branch }} \
            --head ${{ inputs.source-branch }} \
            --state open \
            --json number,url,title,mergeable,statusCheckRollup \
            --jq '.[0]')
          
          if [ -n "$EXISTING_PR" ]; then
            PR_NUMBER=$(echo "$EXISTING_PR" | jq -r '.number')
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.url')
            MERGEABLE=$(echo "$EXISTING_PR" | jq -r '.mergeable')
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            echo "mergeable=$MERGEABLE" >> $GITHUB_OUTPUT
            echo "Found existing PR #$PR_NUMBER (mergeable: $MERGEABLE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No existing PR found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create or Update PR
        id: pr
        if: steps.commits.outputs.count != '0'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          # Build PR body with commit list and auto-merge instructions
          AUTO_MERGE_NOTE=""
          if [ "${{ inputs.auto-merge-on-approve }}" == "true" ]; then
            AUTO_MERGE_NOTE=$(cat <<EOF
          
          ---
          
          ### 🤖 Auto-Merge Enabled
          
          - เมื่อมี Approve ครบ ${{ inputs.required_approvals }} คน → จะ **merge อัตโนมัติ** ทันที
          - Tester: แค่กด **Approve** ก็พอ ไม่ต้องกด merge เอง
          - ⚠️ ${{ inputs.wait_for_ci == 'true' && 'รอ CI ทั้งหมดผ่านก่อน' || 'ไม่รอ CI (merge ทันทีเมื่อ approve)' }}
          EOF
          )
          fi
          
          PR_BODY=$(cat <<EOF
          ## 🚀 Deployment Request: ${{ inputs.project-name }}
          
          | รายละเอียด | ข้อมูล |
          |-----------|--------|
          | **โปรเจค** | ${{ inputs.project-name }} |
          | **ต้นทาง** | \`${{ inputs.source-branch }}\` |
          | **ปลายทาง** | \`${{ inputs.target-branch }}\` |
          | **จำนวน commits** | ${{ steps.commits.outputs.count }} |
          | **Commit ล่าสุด** | ${{ steps.commits.outputs.latest_sha }} |
          | **ผู้พัฒนา** | ${{ steps.commits.outputs.latest_author }} |
          
          ---
          
          ### 📝 รายการ commits:
          
          \`\`\`
          ${{ steps.commits.outputs.list }}
          \`\`\`
          
          ---
          
          ### ✅ ขั้นตอนการดำเนินการ:
          
          1. Review การเปลี่ยนแปลงข้างต้น
          2. Approve PR นี้
          3. ${{ inputs.auto-merge-on-approve == 'true' && 'ระบบจะ auto-merge ให้ทันที' || 'Merge เพื่อ deploy ไปยัง target branch' }}
          
          *🤖 PR นี้ถูกสร้าง/อัพเดทโดยอัตโนมัติ*
          $AUTO_MERGE_NOTE
          EOF
          )
          
          # Create title with commit count
          PR_TITLE="[${{ inputs.project-name }}] ${{ inputs.source-branch }} → ${{ inputs.target-branch }} (${{ steps.commits.outputs.count }} commit(s))"
          
          if [ "${{ steps.check.outputs.exists }}" == "true" ]; then
            if [ "${{ inputs.auto-update-existing }}" == "true" ]; then
              # Update existing PR
              echo "🔄 Updating existing PR #${{ steps.check.outputs.pr_number }}"
              
              gh pr edit ${{ steps.check.outputs.pr_number }} \
                --title "$PR_TITLE" \
                --body "$PR_BODY"
              
              echo "action=updated" >> $GITHUB_OUTPUT
              echo "pr_number=${{ steps.check.outputs.pr_number }}" >> $GITHUB_OUTPUT
              echo "pr_url=${{ steps.check.outputs.pr_url }}" >> $GITHUB_OUTPUT
              
              # Add comment about new commits
              if [ "${{ steps.commits.outputs.count }}" -gt 0 ]; then
                gh pr comment ${{ steps.check.outputs.pr_number }} \
                  --body "📌 **อัพเดท**: มี commit ใหม่ ${{ steps.commits.outputs.count }} รายการ"
              fi
            else
              echo "action=none" >> $GITHUB_OUTPUT
              echo "ℹ️ Auto-update is disabled, skipping PR update"
            fi
          else
            # Create new PR
            echo "✨ Creating new PR"
            
            PR_URL=$(gh pr create \
              --base ${{ inputs.target-branch }} \
              --head ${{ inputs.source-branch }} \
              --title "$PR_TITLE" \
              --body "$PR_BODY" \
              ${{ inputs.assignees != '' && format('--assignee "{0}"', inputs.assignees) || '' }} \
              ${{ inputs.reviewers != '' && format('--reviewer "{0}"', inputs.reviewers) || '' }} \
              ${{ inputs.labels != '' && format('--label "{0}"', inputs.labels) || '' }})
            
            PR_NUMBER=$(echo "$PR_URL" | grep -oP '(?<=pull/)\d+')
            
            echo "action=created" >> $GITHUB_OUTPUT
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            echo "pr_url=$PR_URL" >> $GITHUB_OUTPUT
            
            echo "✅ PR created: $PR_URL"
          fi

      - name: Setup auto-merge (ใช้ GitHub Native Feature) ⭐
        id: auto-merge-setup
        if: inputs.auto-merge-on-approve == 'true' && steps.pr.outputs.action != 'none' && steps.pr.outputs.action != 'skipped'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          echo "🔧 Setting up GitHub native auto-merge"
          echo "Method: ${{ inputs.merge-method }}"
          echo "Required approvals: ${{ inputs.required-approvals }}"
          echo "Wait for CI: ${{ inputs.wait-for-ci }}"
          
          # Enable native GitHub auto-merge
          # This will automatically merge when all conditions are met:
          # - Required number of approvals
          # - CI checks (if wait-for-ci is true)
          gh pr merge ${{ steps.pr.outputs.pr_number }} \
            --${{ inputs.merge-method }} \
            --auto \
            --subject "Auto-merge by PR Manager (approved)" \
            --body "This PR will auto-merge when approved $([ '${{ inputs.wait-for-ci }}' = 'true' ] && echo 'and CI passes')"
          
          echo "✅ GitHub native auto-merge enabled for PR #${{ steps.pr.outputs.pr_number }}"
          
          # Log status for debugging
          echo "Auto-merge status:" >> $GITHUB_STEP_SUMMARY
          echo "- Method: ${{ inputs.merge-method }}" >> $GITHUB_STEP_SUMMARY
          echo "- Required approvals: ${{ inputs.required-approvals }}" >> $GITHUB_STEP_SUMMARY
          echo "- Wait for CI: ${{ inputs.wait-for-ci }}" >> $GITHUB_STEP_SUMMARY
          echo "- PR will merge automatically when approved ✅" >> $GITHUB_STEP_SUMMARY

      - name: Check if PR is already approved and mergeable ⭐ NEW ⭐
        id: check-approval
        if: inputs.auto-merge-on-approve == 'true' && steps.pr.outputs.action != 'none' && steps.pr.outputs.action != 'skipped'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          # Get PR reviews
          REVIEWS=$(gh pr view ${{ steps.pr.outputs.pr_number }} --json reviews,reviewDecision)
          REVIEW_DECISION=$(echo "$REVIEWS" | jq -r '.reviewDecision')
          
          # Count approved reviews
          APPROVED_COUNT=$(echo "$REVIEWS" | jq '[.reviews[] | select(.state == "APPROVED")] | length')
          
          echo "Found $APPROVED_COUNT approvals (required: ${{ inputs.required-approvals }})"
          echo "Review decision: $REVIEW_DECISION"
          
          if [ "$REVIEW_DECISION" == "APPROVED" ] || [ $APPROVED_COUNT -ge ${{ inputs.required-approvals }} ]; then
            echo "✅ PR already has sufficient approvals!"
            echo "already_approved=true" >> $GITHUB_OUTPUT
            
            # If CI wait is disabled or CI already passed, merge immediately
            if [ "${{ inputs.wait-for-ci }}" == "false" ]; then
              echo "⏭️ CI waiting disabled, attempting immediate merge..."
              
              # Try to merge now (GitHub will still check mergeability)
               gh pr merge ${{ steps.pr.outputs.pr_number }} \
                --${{ inputs.merge-method }} \
                --auto 2>&1 || echo "Already in auto-merge queue"
                
              echo "✅ Auto-merge confirmed for PR #${{ steps.pr.outputs.pr_number }}"
            else
              echo "⏳ Waiting for CI checks to pass before auto-merge"
            fi
          else
            echo "already_approved=false" >> $GITHUB_OUTPUT
            echo "⏳ Waiting for ${{ inputs.required-approvals }} approvals (currently $APPROVED_COUNT)"
          fi

      - name: Delete source branch on merge (if enabled)
        if: inputs.delete-on-merge == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.github-token }}
        run: |
          echo "🗑️ Source branch deletion is enabled"
          echo "Note: GitHub can auto-delete branch after merge in repo settings"
          echo "Or you can enable 'Automatically delete head branches' in repo settings"

      - name: Send notification (PR created/updated)
        if: inputs.notify-on-pr-created == 'true' && steps.pr.outputs.action != 'none' && steps.pr.outputs.action != 'skipped'
        shell: bash
        run: |
          if [ -n "${{ inputs.notification-webhook }}" ]; then
            AUTO_STATUS="${{ inputs.auto-merge-on-approve == 'true' && '✅ Auto-merge will trigger on approve' || '❌ Manual merge required' }}"
            
            curl -X POST "${{ inputs.notification-webhook }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"📋 PR ${{ steps.pr.outputs.action }}: ${{ steps.pr.outputs.pr_url }}\n${AUTO_STATUS}\",
                \"project\": \"${{ inputs.project-name }}\",
                \"commits\": ${{ steps.commits.outputs.count }},
                \"source\": \"${{ inputs.source-branch }}\",
                \"target\": \"${{ inputs.target-branch }}\",
                \"auto_merge\": ${{ inputs.auto-merge-on-approve == 'true' }}
              }" || true
          fi

      - name: Output final results
        id: final-output
        shell: bash
        run: |
          # Set outputs
          echo "pr_number=${{ steps.pr.outputs.pr_number }}" >> $GITHUB_OUTPUT
          echo "pr_url=${{ steps.pr.outputs.pr_url }}" >> $GITHUB_OUTPUT
          echo "action=${{ steps.pr.outputs.action }}" >> $GITHUB_OUTPUT
          echo "merged=${{ steps.check-approval.outputs.auto_merged == 'true' || 'false' }}" >> $GITHUB_OUTPUT
          
          # Create detailed step summary
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## 📋 PR Management Result
          
          | รายการ | ผลลัพธ์ |
          |--------|---------|
          | **Action** | ${{ steps.pr.outputs.action }} |
          | **New Commits** | ${{ steps.commits.outputs.count }} |
          | **PR Number** | #${{ steps.pr.outputs.pr_number }} |
          | **PR URL** | ${{ steps.pr.outputs.pr_url }} |
          | **Auto-Merge** | ${{ inputs.auto-merge-on-approve && '✅ Enabled' || '❌ Disabled' }} |
          | **Merge Method** | ${{ inputs.merge-method }} |
          
          ---
          
          ### 🤖 Auto-Merge Status
          
          ${{ inputs.auto-merge-on-approve == 'true' && '
          - เมื่อมี Approve → PR จะ merge **อัตโนมัติ** ทันที
          - Tester: ไม่ต้องกด merge แค่ Approve ก็พอ
          - Tester ใช้สิทธิ์ **Triage** ได้ (ไม่ต้องมี Write)
          ' || '
          - Auto-merge disabled (ต้อง merge แบบ manual)
          ' }}
          
          ### 📝 Commits in this PR
          
          \`\`\`
          ${{ steps.commits.outputs.list }}
          \`\`\`
          EOF
